$schema: 'https://moonrepo.dev/schemas/project.json'
layer: 'application'
tags: ['mojo']
dependsOn: ['jinja2', 'flare']

tasks:
  # check.sh has no engine check today; a lightweight GPU-module compile fills the gap.
  check:
    command: 'pixi run build-gpu-hello'
    toolchain: 'system'
    # src/**/*.mojo covers the entry points, the model facade, and the package
    # subdirs (kernels/, runtime/, models/, chat/, tokenizer/, io/). The
    # verification gates live under tests/gates/.
    inputs: ['src/**/*.mojo', 'tests/gates/**/*.mojo', 'pixi.toml', 'pixi.lock']
